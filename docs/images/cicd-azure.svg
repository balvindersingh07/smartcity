<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="cibg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#0B0F1A"/><stop offset="100%" style="stop-color:#151b2e"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#cibg)" rx="12"/>
  <text x="450" y="36" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">CI/CD and Azure (AKS)</text>
  <text x="450" y="58" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="11">GitHub Actions · GHCR · kubectl apply + set image</text>
  <!-- GitHub -->
  <rect x="50" y="100" width="200" height="100" rx="10" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="150" y="135" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">GitHub Actions</text>
  <text x="150" y="158" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="11">pytest · docker build</text>
  <text x="150" y="178" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="11">push to GHCR</text>
  <!-- GHCR -->
  <rect x="300" y="110" width="160" height="80" rx="8" fill="#252b45" stroke="#7F5AF0"/>
  <text x="380" y="145" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">GHCR</text>
  <text x="380" y="168" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">ghcr.io/&/smart-city-*</text>
  <!-- Azure -->
  <rect x="510" y="85" width="340" height="200" rx="12" fill="#1a2332" stroke="#0078D4" stroke-width="2"/>
  <text x="680" y="118" text-anchor="middle" fill="#50A8FF" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">Azure</text>
  <rect x="540" y="135" width="130" height="60" rx="6" fill="#1e2a3d" stroke="#0078D4"/>
  <text x="605" y="162" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">AKS</text>
  <text x="605" y="180" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="9">staging / prod</text>
  <rect x="690" y="135" width="140" height="60" rx="6" fill="#1e2a3d" stroke="#2ECC71"/>
  <text x="760" y="162" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">PostgreSQL</text>
  <text x="760" y="180" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="9">Flexible Server (tf)</text>
  <rect x="540" y="210" width="290" height="55" rx="6" fill="#1e2a3d" stroke="#9FB0D4"/>
  <text x="685" y="235" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="11">kubectl apply · set image @ ${{ github.sha }}</text>
  <text x="685" y="252" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="9">Network policies · HPA · ingress</text>
  <!-- Arrows -->
  <path d="M250 150 L300 150" stroke="#9FB0D4" stroke-width="2" marker-end="url(#ca)"/>
  <path d="M460 150 L510 150" stroke="#9FB0D4" stroke-width="2" marker-end="url(#ca)"/>
  <defs><marker id="ca" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9FB0D4"/></marker></defs>
  <text x="450" y="330" text-anchor="middle" fill="#6b7a99" font-family="Segoe UI, sans-serif" font-size="10">Secrets: AZURE_CREDENTIALS · AKS_RG_* · AKS_CLUSTER_* · GitHub Environments: staging ’ production</text>
</svg>
