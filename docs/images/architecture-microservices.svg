<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A"/>
      <stop offset="100%" style="stop-color:#151b2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" rx="12"/>
  <text x="460" y="36" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="600">Microservices architecture</text>
  <text x="460" y="58" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Kafka event bus · PostgreSQL · Kubernetes (AKS)</text>
  <!-- Clients -->
  <rect x="40" y="100" width="120" height="56" rx="8" fill="#1a2332" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="100" y="128" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="13">Sensors / IoT</text>
  <text x="100" y="146" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">HTTP ingest</text>
  <rect x="40" y="200" width="120" height="56" rx="8" fill="#1a2332" stroke="#7F5AF0" stroke-width="1.5"/>
  <text x="100" y="228" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="13">React dashboard</text>
  <text x="100" y="246" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">REST / UI</text>
  <!-- Services row -->
  <rect x="220" y="90" width="110" height="72" rx="8" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.2"/>
  <text x="275" y="118" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Ingestion</text>
  <text x="275" y="136" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">FastAPI</text>
  <rect x="350" y="90" width="110" height="72" rx="8" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.2"/>
  <text x="405" y="118" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Processing</text>
  <text x="405" y="136" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">Stream pipeline</text>
  <rect x="480" y="90" width="110" height="72" rx="8" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.2"/>
  <text x="535" y="118" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Storage</text>
  <text x="535" y="136" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">ORM / persist</text>
  <rect x="610" y="90" width="110" height="72" rx="8" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.2"/>
  <text x="665" y="118" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">API</text>
  <text x="665" y="136" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">/metrics /sensors</text>
  <rect x="740" y="90" width="130" height="72" rx="8" fill="#1e2a3d" stroke="#4FD1C5" stroke-width="1.2"/>
  <text x="805" y="118" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Notification</text>
  <text x="805" y="136" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">Alerts / consumers</text>
  <!-- Kafka -->
  <rect x="320" y="220" width="280" height="64" rx="10" fill="#252b45" stroke="#FFC857" stroke-width="1.5" filter="url(#glow)"/>
  <text x="460" y="248" text-anchor="middle" fill="#FFC857" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">Apache Kafka (Redpanda)</text>
  <text x="460" y="268" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="11">Topics: sensor events, processed stream, notifications</text>
  <!-- Postgres -->
  <rect x="360" y="310" width="200" height="56" rx="8" fill="#1a2332" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="460" y="338" text-anchor="middle" fill="#EDF2FF" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">PostgreSQL</text>
  <text x="460" y="356" text-anchor="middle" fill="#9FB0D4" font-family="Segoe UI, sans-serif" font-size="10">Metadata + sensor_data</text>
  <!-- Arrows -->
  <path d="M100 156 L100 176 L275 176 L275 162" fill="none" stroke="#4FD1C5" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M100 200 L100 180 L665 180 L665 162" fill="none" stroke="#7F5AF0" stroke-width="1.5" opacity="0.8"/>
  <path d="M275 162 L405 162" fill="none" stroke="#9FB0D4" stroke-width="1.2"/>
  <path d="M460 162 L460 220" fill="none" stroke="#9FB0D4" stroke-width="1.2"/>
  <path d="M535 162 L665 162" fill="none" stroke="#9FB0D4" stroke-width="1.2"/>
  <path d="M720 162 L740 126" fill="none" stroke="#9FB0D4" stroke-width="1.2"/>
  <path d="M460 284 L460 310" fill="none" stroke="#2ECC71" stroke-width="1.5"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#4FD1C5"/></marker></defs>
</svg>
