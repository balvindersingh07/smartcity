apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: smart-city
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: smart-city-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          image: ghcr.io/example/smart-city/notification-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: smart-city-config
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: smart-city
spec:
  selector:
    app: notification-service
  ports:
    - port: 8005
      targetPort: 8005
