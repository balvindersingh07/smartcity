apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: smart-city
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      serviceAccountName: smart-city-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingestion-service
          image: ghcr.io/example/smart-city/ingestion-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: smart-city-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: smart-city
spec:
  selector:
    app: ingestion-service
  ports:
    - port: 8001
      targetPort: 8001
