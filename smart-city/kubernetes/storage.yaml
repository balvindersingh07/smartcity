apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: smart-city
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
    spec:
      serviceAccountName: smart-city-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: storage-service
          image: ghcr.io/example/smart-city/storage-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: smart-city-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: smart-city-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "600m"
              memory: "1Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: smart-city
spec:
  selector:
    app: storage-service
  ports:
    - port: 8003
      targetPort: 8003
