apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
  namespace: smart-city
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
    spec:
      serviceAccountName: smart-city-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: processing-service
          image: ghcr.io/example/smart-city/processing-service:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: smart-city-config
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
  namespace: smart-city
spec:
  selector:
    app: processing-service
  ports:
    - port: 8002
      targetPort: 8002
