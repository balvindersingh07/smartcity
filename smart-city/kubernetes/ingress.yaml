apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-city-api-ingress
  namespace: smart-city
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: smart-city.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8004
